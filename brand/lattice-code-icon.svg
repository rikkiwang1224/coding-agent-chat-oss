<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Lattice Code icon</title>
  <desc id="desc">White squircle app icon featuring a fresh 3D isometric lattice node with a continuous blue-to-violet gradient across all faces, containing chat and code symbols.</desc>
  <defs>
    <!-- Background Squircle Shadow -->
    <filter id="shadowBase" x="14" y="24" width="996" height="996" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000" flood-opacity="0.12"/>
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.06"/>
    </filter>

    <!-- 3D Shape Shadow -->
    <filter id="shadowShape" x="150" y="150" width="724" height="724" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#6366F1" flood-opacity="0.25"/>
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.08"/>
    </filter>

    <!-- Unified Gradient Palette -->
    <!-- Top Face: Lightest part of the blue-violet spectrum, angled to simulate top-down light -->
    <linearGradient id="gradTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0E7FF"/>   <!-- Light Blue-Indigo -->
      <stop offset="100%" stop-color="#C4B5FD"/> <!-- Light Violet -->
    </linearGradient>

    <!-- Left Face: Mid-tone Blue transitioning towards Indigo -->
    <linearGradient id="gradLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>   <!-- Bright Blue -->
      <stop offset="100%" stop-color="#6366F1"/> <!-- Indigo -->
    </linearGradient>

    <!-- Right Face: Indigo transitioning to deep Violet -->
    <linearGradient id="gradRight" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6"/>   <!-- Violet -->
      <stop offset="100%" stop-color="#6366F1"/> <!-- Indigo (matches left face bottom) -->
    </linearGradient>
  </defs>

  <!-- White squircle background -->
  <rect x="64" y="64" width="896" height="896" rx="220" fill="#FFFFFF" filter="url(#shadowBase)"/>
  <rect x="64" y="64" width="896" height="896" rx="220" fill="none" stroke="#F1F5F9" stroke-width="4"/>

  <!-- The 3D Node (Seamless) -->
  <g filter="url(#shadowShape)">
    <!-- Top Face - Chat / AI -->
    <!-- Removed translation to seal the gaps completely -->
    <g>
      <path d="M 512,512 L 287,382 L 512,252 L 737,382 Z" fill="url(#gradTop)" stroke="url(#gradTop)" stroke-width="2" stroke-linejoin="round"/>
      <circle cx="456" cy="382" r="16" fill="#FFFFFF"/>
      <circle cx="512" cy="382" r="16" fill="#FFFFFF"/>
      <circle cx="568" cy="382" r="16" fill="#FFFFFF"/>
    </g>

    <!-- Left Face - Code '<' -->
    <g>
      <path d="M 512,512 L 287,382 L 287,642 L 512,772 Z" fill="url(#gradLeft)" stroke="url(#gradLeft)" stroke-width="2" stroke-linejoin="round"/>
      <path d="M 434,527 L 366,577 L 434,627" stroke="#FFFFFF" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- Right Face - Code '>' -->
    <g>
      <path d="M 512,512 L 737,382 L 737,642 L 512,772 Z" fill="url(#gradRight)" stroke="url(#gradRight)" stroke-width="2" stroke-linejoin="round"/>
      <path d="M 590,527 L 658,577 L 590,627" stroke="#FFFFFF" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>

    <!-- Central Ridge Highlight (Optional, adds crispness to the joined edges) -->
    <path d="M 512,512 L 512,772 M 512,512 L 287,382 M 512,512 L 737,382" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>